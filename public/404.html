<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>redirecting…</title>
    <meta name="robots" content="noindex" />
  </head>
  <body>
    <script>
      // SPA fallback for GitHub Pages (project site).
      // Redirect unknown paths back to the app entry while preserving the route.
      //
      // Repo base path:
      //   https://hseadc.github.io/dubside/
      (function () {
        const base = '/dubside/';
        const l = window.location;

        // Keep pathname+search+hash, but remove the base prefix from the stored route.
        const fullPath = l.pathname + l.search + l.hash;
        const route = fullPath.indexOf(base) === 0 ? fullPath.slice(base.length - 1) : fullPath;

        // Encode route into query so the SPA can restore it.
        // We use ?p=... to avoid clashing with your app routes.
        const target = base + '?p=' + encodeURIComponent(route);
        l.replace(target);
      })();
    </script>
  </body>
</html>
